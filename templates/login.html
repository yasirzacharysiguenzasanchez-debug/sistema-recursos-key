<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Ingreso al sistema</title>

    <!-- AdminLTE -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-rc7/dist/css/adminlte.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{

            margin:0;
            padding:0;

            height:100vh;

            background-image:
            linear-gradient(
                rgba(0,0,0,0.65),
                rgba(0,0,0,0.65)
            ),
            url("{{ url_for('static', filename='img/lab.jpeg') }}");

            background-size:cover;
            background-position:center;

            overflow:hidden;
        }

        .main-container{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            gap:80px;

            padding:40px;

        }

        .login-card{

            width:420px;

            background: rgba(255,255,255,0.12);

            backdrop-filter: blur(12px);

            border-radius:20px;

            padding:40px;

            box-shadow:0 8px 32px rgba(0,0,0,0.3);

            color:white;

            animation:fadeIn 1s ease;

        }

        .logo{

            width:260px;

            display:block;

            margin:auto;

            margin-bottom:25px;

        }

        .title{

            text-align:center;

            font-size:36px;

            font-weight:bold;

            margin-bottom:10px;

        }

        .subtitle{

            text-align:center;

            margin-bottom:30px;

            opacity:0.9;

        }

        .form-control{

            height:52px;

            border-radius:12px;

            border:none;

            font-size:16px;

        }

        .btn-login{

            height:52px;

            border-radius:12px;

            font-size:18px;

            font-weight:bold;

        }

        .laptop-img{

            width:520px;

            animation:float 4s ease-in-out infinite;

        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-15px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        @keyframes fadeIn{

            from{

                opacity:0;

                transform:translateY(30px);

            }

            to{

                opacity:1;

                transform:translateY(0);

            }

        }

    </style>

</head>

<body>

<div class="main-container">

    <!-- LOGIN -->

    <div class="login-card">

        <img
        src="{{ url_for('static', filename='img/log.png') }}"
        class="logo">

        <div class="title">

            Key Resources

        </div>

        <div class="subtitle">

            Sistema de gestión de recursos

        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}

    {% if messages %}

        {% for category, message in messages %}

            <div class="alert alert-{{ category }} alert-dismissible fade show">

                {{ message }}

                <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert">
                </button>

            </div>

        {% endfor %}

    {% endif %}

{% endwith %}

        <form method="POST">

            <div class="mb-3">

                <input
                type="text"
                name="usuario"
                class="form-control"
                placeholder="Nombre completo"
                required>

            </div>

            <div class="mb-4">

                <input
                type="email"
                name="correo"
                class="form-control"
                placeholder="Correo institucional"
                required>

            </div>

            <div class="mb-4">

    <input
    type="password"
    name="password"
    class="form-control"
    placeholder="Contraseña"
    required>

</div>

            <button
            type="submit"
            class="btn btn-primary w-100 btn-login">

                Ingresar

            </button>

        </form>

    </div>

    <!-- LAPTOP -->

    <div>

        <img
        src="{{ url_for('static', filename='img/laptop.png') }}"
        class="laptop-img">

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
